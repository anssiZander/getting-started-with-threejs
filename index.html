<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth Marker AR</title>
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(9, 14, 27, 0.72);
        --panel-border: rgba(144, 203, 255, 0.28);
        --text-main: #f5fbff;
        --text-soft: #b8c8de;
        --accent: #88ddff;
        --accent-strong: #ffffff;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: transparent;
        color: var(--text-main);
      }

      body {
        position: fixed;
        inset: 0;
      }

      a-scene {
        position: fixed !important;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        background: transparent !important;
      }

      video {
        position: fixed !important;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
        z-index: 0 !important;
      }

      a-scene canvas,
      .a-canvas {
        background: transparent !important;
        z-index: 1 !important;
      }

      .overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 1rem;
        box-sizing: border-box;
        z-index: 10;
      }

      .panel {
        max-width: min(24rem, calc(100vw - 2rem));
        padding: 1rem 1.1rem;
        border: 1px solid var(--panel-border);
        border-radius: 1rem;
        background: var(--panel-bg);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(10px);
        pointer-events: auto;
      }

      .eyebrow {
        margin: 0 0 0.35rem;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.25rem, 3.8vw, 1.9rem);
        line-height: 1.05;
      }

      p {
        margin: 0.75rem 0 0;
        font-size: 0.96rem;
        line-height: 1.45;
        color: var(--text-soft);
      }

      a {
        color: var(--accent-strong);
      }

      .status {
        max-width: min(18rem, calc(100vw - 2rem));
        align-self: flex-end;
        font-size: 0.95rem;
      }

      @media (max-width: 720px) {
        .overlay {
          flex-direction: column;
          gap: 0.75rem;
          justify-content: flex-start;
        }

        .status {
          align-self: stretch;
        }
      }
    </style>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <div class="overlay">
      <section class="panel">
        <p class="eyebrow">Marker AR</p>
        <h1>Rotating Earth on Hiro</h1>
        <p>
          Open this page on your phone, allow camera access, and point at
          <a href="./textures/hiro.png" target="_blank" rel="noreferrer">hiro.png</a>.
          The Earth is lifted slightly above the marker so it feels like it is hovering.
        </p>
      </section>

      <section class="panel status">
        <strong>Status</strong>
        <p data-status-copy>Allow camera access, then point your phone at the Hiro marker.</p>
      </section>
    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true; colorManagement: true"
      arjs="trackingMethod: best; sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >
      <a-marker
        preset="hiro"
        smooth="true"
        smooth-count="10"
        smooth-tolerance="0.01"
        smooth-threshold="5"
        emitevents="true"
        data-hiro-marker
      >
        <a-entity
          position="0 0.55 0"
          rotation="0 0 0"
          scale="0.32 0.32 0.32"
          data-earth-anchor
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script type="module" src="index.js"></script>
  </body>
</html>
